<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-D Sınıf Portalı - Giriş</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <img src="image_e701e2.jpg" alt="7-D Logo" class="logo">
        <h2>7-D Sınıf Portalına Hoş Geldiniz!</h2>
        <p class="subtitle">Birlikte Daha Güçlüyüz</p>

        <div id="auth-form">
            <h3 id="form-title">Giriş Yap</h3>
            <input type="email" id="email" placeholder="Okul E-postası veya E-posta" required>
            <input type="password" id="password" placeholder="Şifre" required>
            
            <button id="main-btn" onclick="handleAuth()">Giriş Yap</button>
            
            <p class="toggle-text" id="toggle-link" onclick="toggleForm()">Hesabın yok mu? Kayıt Ol</p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
