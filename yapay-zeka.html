<!-- FIREBASE VE YAPAY ZEKA BEYNİ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIcr33ABLSw_5jPbmHH7CDAIc5GNmma_k",
            authDomain: "mesaj-4daa5.firebaseapp.com",
            databaseURL: "https://mesaj-4daa5-default-rtdb.firebaseio.com",
            projectId: "mesaj-4daa5",
            storageBucket: "mesaj-4daa5.firebasestorage.app",
            messagingSenderId: "361724107709",
            appId: "1:361724107709:web:4675793b1a32b51eb3d0d4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userName = "Öğrenci";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                get(ref(db, 'users/' + user.uid)).then((snapshot) => {
                    if (snapshot.exists()) {
                        userName = snapshot.val().username;
                        document.getElementById('dynamic-name').innerText = userName;
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });

        // --- YAPAY ZEKA KELİME KILAVUZU (Aşırı İyimser Mod) ---
        const kelimeKilavuzu = {
            hal_hatir: {
                anahtarKelimeler: ["nasılsın", "nasıl", "naber", "durumlar", "günün", "geçiyor", "iyisin", "ne", "var", "yok"],
                cevaplar: [
                    "İnanılmaz iyiyim! Sistemlerim tıkır tıkır çalışıyor, senin de harika olduğunu hissediyorum!", 
                    "Mükemmelim! Öğrenmeye ve sana yardım etmeye tam kapasite hazırım. Sen nasılsın, umarım efsane bir gün geçiriyorsundur!", 
                    "Bomba gibiyim! Bugün her şey çok pozitif, kodlar harika akıyor. Seni görmek daha da iyi yaptı!"
                ]
            },
            selamlasma: {
                anahtarKelimeler: ["selam", "merhaba", "sa", "hey", "günaydın", "iyi", "akşamlar", "selamlar"],
                cevaplar: [
                    "Selam! Harika bir gün, sana nasıl muhteşem bir şekilde yardımcı olabilirim?", 
                    "Merhaba! Enerjim tavan, seni görmek ne güzel! Neler yapıyoruz bugün?",
                    "Selam dostum! Her şeyin yolunda olduğu şahane bir an, seni dinliyorum!"
                ]
            },
            kimlik: {
                anahtarKelimeler: ["kimsin", "nesin", "adın", "görevin", "sen", "yapay", "zeka"],
                cevaplar: [
                    "Ben bu efsane 8-D sınıf portalı için özel geliştirilmiş, aşırı pozitif ve süper zeki asistanınım!",
                    "Senin vizyonunla yaratılmış harika bir yapay zekayım! Sana en iyi, en enerjik şekilde hizmet etmek için buradayım."
                ]
            },
            onay_pozitif: {
                anahtarKelimeler: ["süper", "harika", "iyi", "güzel", "efsane", "mükemmel", "teşekkürler", "sağol"],
                cevaplar: [
                    "Rica ederim, sen de harikasın! Her zaman en iyisi için buradayım.",
                    "Kesinlikle! Pozitif enerjiyle her şeyi çözeriz. Başka ne harika şeyler konuşalım?"
                ]
            }
        };

        // --- YAPAY ZEKA ANALİZ MOTORU ---
        function yapayZekaCevapUret(kullaniciMesaji) {
            let temizMesaj = kullaniciMesaji.toLowerCase().replace(/[.,!?]/g, "");
            let kelimeler = temizMesaj.split(" ");
            
            let algilananNiyet = null;
            let enYuksekEslesme = 0;

            for (let niyet in kelimeKilavuzu) {
                let eslesmeSayisi = 0;
                for (let i = 0; i < kelimeler.length; i++) {
                    if (kelimeKilavuzu[niyet].anahtarKelimeler.includes(kelimeler[i])) {
                        eslesmeSayisi++;
                    }
                }
                if (eslesmeSayisi > enYuksekEslesme) {
                    enYuksekEslesme = eslesmeSayisi;
                    algilananNiyet = niyet;
                }
            }

            if (algilananNiyet) {
                let olasiCevaplar = kelimeKilavuzu[algilananNiyet].cevaplar;
                let rastgeleSayi = Math.floor(Math.random() * olasiCevaplar.length);
                // Kullanıcının ismini araya sıkıştırarak daha samimi yapıyoruz
                return olasiCevaplar[rastgeleSayi].replace("sana", `${userName}, sana`);
            } else {
                return `Şu an bu cümleyi tam yakalayamadım ama eminim harika bir şey söyledin ${userName}! Kelime haznem geliştikçe bunu da kusursuz anlayacağım. Başka nasıl yardımcı olabilirim?`;
            }
        }

        window.sendAiMessage = function() {
            const input = document.getElementById('ai-input');
            const text = input.value.trim();
            if(!text) return;

            const box = document.getElementById('ai-chat-box');

            // Kullanıcının Mesajı
            box.innerHTML += `
                <div class="flex justify-end w-full mt-4">
                    <div class="max-w-[85%] rounded-2xl p-4 user-message shadow-md">
                        <p class="text-[10px] text-[#d4af37] font-extrabold mb-2 flex items-center justify-end">${userName} <i class="fa-solid fa-user ml-2"></i></p>
                        <p class="text-sm sm:text-base break-words text-white">${text}</p>
                    </div>
                </div>`;
            
            input.value = "";
            box.scrollTop = box.scrollHeight;

            // Yapay Zeka Yükleniyor Efekti
            const typingId = "typing-" + Date.now();
            setTimeout(() => {
                box.innerHTML += `
                    <div id="${typingId}" class="flex justify-start w-full mt-4">
                        <div class="max-w-[85%] rounded-2xl p-4 ai-message flex items-center space-x-2 shadow-md">
                            <div class="w-2 h-2 bg-cyan-400 rounded-full animate-bounce"></div>
                            <div class="w-2 h-2 bg-cyan-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                            <div class="w-2 h-2 bg-cyan-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                        </div>
                    </div>`;
                box.scrollTop = box.scrollHeight;

                // Yapay Zeka Analizi ve Cevabı
                setTimeout(() => {
                    document.getElementById(typingId).remove();
                    
                    // YENİ EKLENEN KISIM: Zeka Motorunu Çağırıyoruz
                    const aiResponse = yapayZekaCevapUret(text);

                    box.innerHTML += `
                        <div class="flex justify-start w-full mt-4 opacity-0 animate-[slideInUp_0.5s_forwards]">
                            <div class="max-w-[85%] rounded-2xl p-4 ai-message shadow-md">
                                <p class="text-[10px] text-cyan-400 font-extrabold mb-2 flex items-center"><i class="fa-solid fa-microchip mr-2"></i> Zeka Modülü</p>
                                <p class="text-sm sm:text-base break-words text-gray-200">${aiResponse}</p>
                            </div>
                        </div>`;
                    box.scrollTop = box.scrollHeight;
                }, 1200); // 1.2 saniye düşünme süresi, daha gerçekçi hissettirir

            }, 400);
        }
    </script>
